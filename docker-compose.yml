version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xuxemons_laravel
    volumes:
      - backend-data:/var/www/html
      - ./backend:/var/www/html:cached # solo para desarrollo, opcional
    ports:
      - "8000:80"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: xuxemons_db
      DB_USERNAME: xuxemons_user
      DB_PASSWORD: 1234
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    image: node:20-alpine
    container_name: xuxemons_angular
    working_dir: /app
    volumes:
      - frontend-data:/app
      - ./frontend:/app:cached # solo desarrollo
    ports:
      - "4200:4200"
    command: sh -c "npm start -- --host 0.0.0.0 --poll=500 --hmr" # polling más bajo
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: xuxemons_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: xuxemons_db
      MYSQL_USER: xuxemons_user
      MYSQL_PASSWORD: 1234
      MYSQL_ROOT_PASSWORD: 4321
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

volumes:
  backend-data:
    driver: local
  frontend-data:
    driver: local
  mysql-data:
    driver: local

networks:
  app-network:
    driver: bridge